<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AI Avatar Project</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      margin: 0;
      padding: 0;
    }

    header {
      text-align: center;
      padding: 25px;
      background: #1e293b;
    }

    h1 {
      margin: 0;
      font-size: 26px;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 35px;
      padding: 20px;
    }

    .card {
      width: 85%;
      max-width: 700px;
      background: #1e293b;
      padding: 20px;
      border-radius: 12px;
    }

    video {
      width: 100%;
      border-radius: 10px;
      background: black;
      margin-top: 10px;
    }

    p {
      color: #cbd5e1;
      font-size: 14px;
    }
  </style>
</head>

<body>

<header>
  <h1>🤖 AI Avatar Project</h1>
  <p>Generative AI Video Showcase</p>
</header>

<div class="container">

  <div class="card">
    <h2>🎮 Avatar 1: Game Developer</h2>
    <p>AI-generated game developer concept.</p>
    <video controls>
      <source src="./avatar1.mp4" type="video/mp4">
    </video>
  </div>

  <div class="card">
    <h2>🧑‍💻 Avatar 2: AI Clone</h2>
    <p>Digital clone of my face and voice.</p>
    <video controls>
      <source src="./avatar2.mp4" type="video/mp4">
    </video>
  </div>

  <div class="card">
    <h2>🚀 Avatar 3: Future AI Mentor</h2>
    <p>AI from the year 2050 explaining technology evolution.</p>
    <video controls>
      <source src="./avatar3.mp4" type="video/mp4">
    </video>
  </div>

</div>

</body>
</html>
